services:
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "[ -f /data/.minio.sys/format.json ] || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scan2serve
      POSTGRES_USER: scan2serve
      POSTGRES_PASSWORD: scan2serve
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scan2serve -d scan2serve"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-users:/etc/clickhouse-server/users.d
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8123/ping >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - ./apps/api/.env
    volumes:
      - ./:/app
      - api-node-modules:/app/node_modules
      - api-app-node-modules:/app/apps/api/node_modules
      - api-pnpm-store:/pnpm-store
    environment:
      NODE_ENV: development
      CI: "true"
      PNPM_CONFIG_CONFIRM_MODULES_PURGE: "false"
      PNPM_STORE_PATH: /pnpm-store
      DATABASE_URL: postgresql://scan2serve:scan2serve@db:5432/scan2serve
      CLIENT_URL: http://localhost:3000
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: scan2serve
      REDIS_URL: redis://redis:6379
    command: >
      sh -c "corepack enable && pnpm install --no-frozen-lockfile --store-dir /pnpm-store && pnpm --filter @scan2serve/api db:migrate:deploy && pnpm --filter @scan2serve/api db:generate && pnpm --filter @scan2serve/api db:seed && pnpm --filter @scan2serve/api clickhouse:users && pnpm --filter @scan2serve/api clickhouse:bootstrap && pnpm --filter @scan2serve/api dev"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:4000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - ./apps/web/.env
    volumes:
      - ./:/app
      - web-node-modules:/app/node_modules
      - web-app-node-modules:/app/apps/web/node_modules
      - web-next-cache:/app/apps/web/.next
      - web-pnpm-store:/pnpm-store
    environment:
      NODE_ENV: development
      CI: "true"
      PNPM_CONFIG_CONFIRM_MODULES_PURGE: "false"
      PNPM_STORE_PATH: /pnpm-store
      API_INTERNAL_URL: http://api:4000
    command: >
      sh -c "corepack enable && pnpm install --no-frozen-lockfile --store-dir /pnpm-store && cd /app/apps/web && pnpm exec next dev --hostname 0.0.0.0 --port 3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 10
      start_period: 20s

  gateway:
    image: nginx:alpine
    volumes:
      - ./gateway/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    env_file:
      - ./apps/api/.env
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 1m
      timeout: 5s
      retries: 10
      start_period: 10s

  tests:
    image: node:20-alpine
    profiles: ["tests"]
    working_dir: /app
    volumes:
      - ./:/app
      - test-node-modules:/app/node_modules
      - test-api-node-modules:/app/apps/api/node_modules
      - test-web-node-modules:/app/apps/web/node_modules
      - test-pnpm-store:/pnpm-store
    environment:
      NODE_ENV: test
      CI: "true"
      PNPM_CONFIG_CONFIRM_MODULES_PURGE: "false"
      PNPM_STORE_PATH: /pnpm-store
    command: >
      sh -c "corepack enable && pnpm install --no-frozen-lockfile --store-dir /pnpm-store && pnpm --filter @scan2serve/api test && pnpm --filter @scan2serve/web test"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  db-data:
  minio-data:
  clickhouse-data:
  redis-data:
  api-node-modules:
  api-app-node-modules:
  api-pnpm-store:
  web-node-modules:
  web-app-node-modules:
  web-pnpm-store:
  web-next-cache:
  test-node-modules:
  test-api-node-modules:
  test-web-node-modules:
  test-pnpm-store:
