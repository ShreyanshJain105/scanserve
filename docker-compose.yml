services:
  minio:
    image: minio/minio:latest
    container_name: scan2serve-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "[ -f /data/.minio.sys/format.json ] || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: scan2serve-db
    environment:
      POSTGRES_DB: scan2serve
      POSTGRES_USER: scan2serve
      POSTGRES_PASSWORD: scan2serve
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scan2serve -d scan2serve"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    image: node:20-alpine
    container_name: scan2serve-api
    working_dir: /app
    env_file:
      - ./apps/api/.env.local
    volumes:
      - ./:/app
      - api-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      CI: "true"
      PNPM_CONFIG_CONFIRM_MODULES_PURGE: "false"
      DATABASE_URL: postgresql://scan2serve:scan2serve@db:5432/scan2serve
      CLIENT_URL: http://localhost:3000
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
    command: >
      sh -c "corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter @scan2serve/api db:push && pnpm --filter @scan2serve/api db:seed && pnpm --filter @scan2serve/api dev"
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:4000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    image: node:20-alpine
    container_name: scan2serve-web
    working_dir: /app
    env_file:
      - ./apps/web/.env.local
    volumes:
      - ./:/app
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/apps/web/.next
    environment:
      NODE_ENV: development
      CI: "true"
      PNPM_CONFIG_CONFIRM_MODULES_PURGE: "false"
      API_INTERNAL_URL: http://api:4000
    command: >
      sh -c "corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter @scan2serve/web exec next dev --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  db-data:
  minio-data:
  api-node-modules:
  web-node-modules:
  web-next-cache:
