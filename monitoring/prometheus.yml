global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]
    authorization:
      type: Bearer
      credentials: "local-internal-key"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "clickhouse"
    metrics_path: /metrics
    static_configs:
      - targets: ["clickhouse:8123"]
